<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Midnight Balcony Cat</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="scene-panel" aria-label="Moonlit balcony with a cat">
        <div class="sky-glow" aria-hidden="true"></div>
        <div class="moon" aria-hidden="true"></div>
        <div class="moon-haze" aria-hidden="true"></div>
        <div class="stars" aria-hidden="true">
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>

        <section class="scene-copy">
          <div class="copy-card">
            <p class="eyebrow">Midnight Balcony Dispatches</p>
            <h1>Press the cat.</h1>
            <p class="intro">
              It has small, strange, surprisingly sincere things to say.
            </p>
            <p class="interaction-hint">
              Click the cat to hear a new quote.
            </p>

            <div class="quote-bubble" id="quoteBubble" role="status" aria-live="polite">
              Tap the cat for a funny, heartfelt quote.
            </div>
          </div>
        </section>

        <section class="balcony-scene" aria-hidden="true">
          <div class="cityline"></div>
          <div class="balcony-light"></div>
          <div class="moonbeam"></div>
          <div class="lantern lantern-left"></div>
          <div class="lantern lantern-right"></div>

          <div class="moon-zone">
            <div class="moon-caption">soft air. silver light. suspiciously wise cat.</div>
          </div>

          <button
            class="cat-button"
            id="catButton"
            type="button"
            aria-label="Black cat on a balcony. Press for a quote."
          >
            <img class="cat-art" src="assets/cat.svg" alt="" />
            <span class="cat-tag">click me for moonlit wisdom</span>
          </button>

          <div class="balcony">
            <div class="railing"></div>
            <div class="planter planter-left"></div>
            <div class="planter planter-right"></div>
            <div class="floor"></div>
          </div>
        </section>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
